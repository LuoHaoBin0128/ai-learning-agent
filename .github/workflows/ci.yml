name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: node -e "require('./server.js')" 2>/dev/null; echo 'Syntax OK'

  validate-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON data files
        run: |
          for f in data/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "✓ $f valid" || echo "✗ $f invalid"
          done
