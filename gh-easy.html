<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GitHub 认证 - 输入验证码</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#0f0f0f;color:#e0e0e0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.card{background:#1a1a2e;border-radius:16px;padding:40px;max-width:440px;width:100%;text-align:center}
h2{color:#fff;font-size:22px;margin-bottom:6px}
.sub{color:#8e8e93;font-size:13px;margin-bottom:24px;line-height:1.6}
.highlight{background:#252540;border-radius:8px;padding:16px;margin-bottom:20px}
.highlight code{font-size:28px;color:#60a5fa;letter-spacing:4px;font-weight:700}
.highlight p{font-size:12px;color:#8e8e93;margin-top:6px}
input{width:100%;padding:16px;border:2px solid #252540;border-radius:10px;background:#0f0f0f;color:#fff;font-size:28px;text-align:center;letter-spacing:6px;font-weight:700;outline:none;box-sizing:border-box}
input:focus{border-color:#3B82F6}
button{width:100%;padding:16px;margin-top:14px;background:#3B82F6;color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer}
button:hover{background:#2563EB}
button:disabled{background:#333;color:#666;cursor:not-allowed}
#status{margin-top:16px;font-size:13px;min-height:24px}
.ok{color:#22c55e}
.err{color:#ef4444}
a{color:#60a5fa}
</style>
</head>
<body>
<div class="card">
<h2>GitHub 认证</h2>
<p class="sub">验证码已发送至 <strong>3194969503@qq.com</strong><br>请在 QQ 邮箱中查收</p>
<div class="highlight">
<code>6DF1-4959</code>
<p>设备授权码（验证通过后自动使用）</p>
</div>
<input type="text" id="otp" placeholder="输入邮箱中的 6 位验证码" maxlength="8" autocomplete="off">
<button id="btn" onclick="submitCode()">提交验证</button>
<div id="status"></div>
</div>
<script>
async function submitCode() {
    var code = document.getElementById("otp").value.trim();
    if (!code || code.length < 6) return;
    var btn = document.getElementById("btn");
    var st = document.getElementById("status");
    btn.disabled = true;
    btn.textContent = "提交中...";
    st.innerHTML = "";
    try {
        var r = await fetch("/gh-auth-submit?otp=" + encodeURIComponent(code));
        var data = await r.json();
        if (data.status === "success") {
            st.innerHTML = "<div class=\"ok\">✅ 认证成功！仓库已推送至 GitHub！<br><a href=\"https://github.com/LuoHaoBin0128/ai-learning-agent\" target=\"_blank\">查看 GitHub 仓库</a></div>";
            btn.textContent = "完成！";
        } else if (data.status === "polling") {
            st.innerHTML = "<div class=\"ok\">验证通过！等待 GitHub 授权...<br>" + data.message + "</div>";
            btn.textContent = "已完成";
        } else {
            st.innerHTML = "<div class=\"err\">❌ " + data.message + "</div>";
            btn.disabled = false;
            btn.textContent = "重试";
        }
    } catch(e) {
        st.innerHTML = "<div class=\"err\">网络错误，请刷新重试</div>";
        btn.disabled = false;
        btn.textContent = "重试";
    }
}
document.getElementById("otp").addEventListener("keydown", function(e) {
    if (e.key === "Enter") submitCode();
});
</script>
</body>
</html>
